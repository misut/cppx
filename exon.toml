[package]
name = "cppx"
version = "0.2.0"
description = "C++ extension library: portable reflection, platform detection, and environment shims for misut projects"
authors = ["Geunryeol Park (misut)"]
license = "MIT"
type = "lib"
standard = 23

# Sanitizer CI: ASan/UBSan/LSan on macOS and Linux, MSVC AddressSanitizer on Windows.
# All flags PRIVATE on the cppx-modules target so add_subdirectory consumers
# don't inherit them. macOS/Linux use clang's `-fsanitize=address,undefined`;
# Windows MSVC uses `/fsanitize=address` (LSan is unavailable on MSVC).
[target.'cfg(os = "linux")'.build]
cxxflags = ["-fsanitize=address,undefined", "-fno-omit-frame-pointer"]
ldflags  = ["-fsanitize=address,undefined"]

[target.'cfg(os = "macos")'.build]
cxxflags = ["-fsanitize=address,undefined", "-fno-omit-frame-pointer"]
ldflags  = ["-fsanitize=address,undefined"]

[target.'cfg(os = "windows")'.build]
cxxflags = ["/fsanitize=address"]
