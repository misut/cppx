[package]
name = "cppx"
version = "1.2.0"
description = "C++ extension library: reflection, platform detection, environment shims, and HTTP networking"
authors = ["Geunryeol Park (misut)"]
license = "MIT"
type = "lib"
standard = 23

# Sanitizer CI: ASan/UBSan/LSan on macOS and Linux, MSVC AddressSanitizer
# on Windows. Declared per-target so downstream consumers don't see the
# flags. exon ≥0.21.2 wraps these emissions in if(PROJECT_IS_TOP_LEVEL),
# so the sanitizer-instrumented .o files only end up in cppx's static
# library when cppx is built standalone — FetchContent / add_subdirectory
# consumers see a clean libcppx-modules.a.
[target.'cfg(os = "linux")'.build]
cxxflags = ["-fsanitize=address,undefined", "-fno-omit-frame-pointer"]
ldflags  = ["-fsanitize=address,undefined", "-lssl", "-lcrypto"]

[target.'cfg(os = "macos")'.build]
cxxflags = ["-fsanitize=address,undefined", "-fno-omit-frame-pointer"]
ldflags  = ["-fsanitize=address,undefined", "-framework", "Security", "-Wl,-framework,CoreFoundation"]

[target.'cfg(os = "windows")'.build]
cxxflags = ["/fsanitize=address"]
