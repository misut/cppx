[package]
name = "cppx"
version = "0.3.1"
description = "C++ extension library: portable reflection, platform detection, and environment shims"
authors = ["Geunryeol Park (misut)"]
license = "MIT"
type = "lib"
standard = 23

# Note: sanitizer CI is wired via EXON_CXXFLAGS / EXON_LDFLAGS in
# .github/workflows/ci.yml, NOT via [target.cfg.build] sections. The
# declarative form bakes sanitizer instrumentation into the .a archive,
# which then forces every downstream FetchContent consumer to also link
# the sanitizer runtimes — defeating the "exon-managed projects must be
# importable by raw cmake + ninja" design goal. The env-var path only
# flows through the cmake CLI for cppx's own build, leaving the
# checked-in CMakeLists.txt clean for consumers.
